<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5b5fd9"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- 8-point starburst (outer radius 12, inner radius 4.5) -->
  <polygon
    points="16,3 17.8,11.5 25.5,7.5 20.5,14.2 29,16 20.5,17.8 25.5,24.5 17.8,20.5 16,29 14.2,20.5 6.5,24.5 11.5,17.8 3,16 11.5,14.2 6.5,7.5 14.2,11.5"
    fill="white"
    opacity="0.95"
  />
  <!-- Bright center core -->
  <circle cx="16" cy="16" r="3.2" fill="url(#core)"/>
</svg>
